<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Kiko Tajada</title>
  <meta name="description" content="Get in touch with Kiko Tajada." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fefdf8;
      --text:         #111111;
      --muted:        #5a5a5a;
      --faint:        #9a9a9a;
      --border:       #e8e6df;
      --accent:       #c48f00;
      --accent-bg:    #fdf4dc;
      --white:        #ffffff;
      --font:         'Inter', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .site { min-height: 100vh; }

    .main {
      padding: 3.5rem 5rem 6rem;
      max-width: 820px;
      margin: 0 auto;
    }

    .header { margin-bottom: 3.5rem; }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .site-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    nav { display: flex; gap: 1.75rem; }

    nav a {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      text-decoration: none;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .contact-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }

    .contact-item:hover {
      border-color: var(--accent);
      background: var(--accent-bg);
    }

    .contact-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--accent-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 0.1rem;
    }

    .contact-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    @media (max-width: 640px) {
      .main { padding: 2rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>
  <div class="site">
    <main class="main">
      <header class="header">
        <div class="header-top">
          <a href="/" class="site-name">Kiko Tajada</a>
          <nav>
            <a href="/">Home</a>
            <a href="/blog/">Blog</a>
            <a href="/contact/" class="active">Contact</a>
          </nav>
        </div>
      </header>

      <h1 class="page-title">Contact</h1>
      <p class="page-subtitle">Feel free to reach out — always happy to connect.</p>

      <div class="contact-grid">

        <a href="mailto:ftajadalostao@gmail.com" class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
          </div>
          <div>
            <div class="contact-label">Email</div>
            <div class="contact-value">ftajadalostao@gmail.com</div>
          </div>
        </a>

        <a href="https://www.linkedin.com/in/kikotajada/" target="_blank" rel="noopener" class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </div>
          <div>
            <div class="contact-label">LinkedIn</div>
            <div class="contact-value">linkedin.com/in/kikotajada</div>
          </div>
        </a>

        <a href="https://x.com/kikotajada" target="_blank" rel="noopener" class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4l16 16M4 20L20 4"/></svg>
          </div>
          <div>
            <div class="contact-label">X (Twitter)</div>
            <div class="contact-value">@kikotajada</div>
          </div>
        </a>

        <a href="https://github.com/kikotajada" target="_blank" rel="noopener" class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          </div>
          <div>
            <div class="contact-label">GitHub</div>
            <div class="contact-value">github.com/kikotajada</div>
          </div>
        </a>

      </div>
    </main>
  </div>
</body>
</html>
