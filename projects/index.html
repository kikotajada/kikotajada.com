<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Kiko Tajada</title>
  <meta name="description" content="Get in touch with Kiko Tajada." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fefdf8;
      --text:         #111111;
      --muted:        #5a5a5a;
      --faint:        #9a9a9a;
      --border:       #e8e6df;
      --accent:       #c48f00;
      --accent-bg:    #fdf4dc;
      --white:        #ffffff;
      --font:         'Inter', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .site { min-height: 100vh; }

    .main {
      padding: 3.5rem 5rem 6rem;
      max-width: 820px;
      margin: 0 auto;
    }

    .header { margin-bottom: 3.5rem; }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .site-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    nav { display: flex; gap: 1.75rem; }

    nav a {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      text-decoration: none;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .projects-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .projects-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }

    .projects-item:hover {
      border-color: var(--accent);
      background: var(--accent-bg);
    }

    .projects-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--accent-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .projects-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .projects-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 0.1rem;
    }

    .projects-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    @media (max-width: 640px) {
      .main { padding: 2rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>
  <div class="site">
    <main class="main">
      <header class="header">
        <div class="header-top">
          <a href="/" class="site-name">Kiko Tajada</a>
          <nav>
            <a href="/">Home</a>
            <a href="/blog/">Blog</a>
            <a href="/contact/">Contact</a>
            <a href="/projects/" class="active">Projects</a>
          </nav>
        </div>
      </header>

      <h1 class="page-title">Projects</h1>
      <p class="page-subtitle">Here are some of my latest projects</p>

      <div class="projects-grid">

        <a class="projects-item">
          <div>
            <div class="projects-label">Project_1</div>
            <div class="projects-value">Placeholder</div>
          </div>
        </a>

       

      </div>
    </main>
  </div>
</body>
</html>
