<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Kiko Tajada</title>
  <meta name="description" content="Writing on supply chain, finance, and ideas worth sharing." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fefdf8;
      --text:         #111111;
      --muted:        #5a5a5a;
      --faint:        #9a9a9a;
      --border:       #e8e6df;
      --accent:       #c48f00;
      --accent-bg:    #fdf4dc;
      --white:        #ffffff;
      --font:         'Inter', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .site { min-height: 100vh; }

    .main {
      padding: 3.5rem 5rem 6rem;
      max-width: 820px;
      margin: 0 auto;
    }

    .header { margin-bottom: 3.5rem; }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .site-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    nav { display: flex; gap: 1.75rem; }

    nav a {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      text-decoration: none;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .post-list { display: flex; flex-direction: column; gap: 2rem; }

    .post {
      border-top: 1px solid var(--border);
      padding-top: 2rem;
    }

    .post-date {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 0.5rem;
    }

    .post-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      display: block;
      margin-bottom: 0.5rem;
    }
    .post-title:hover { color: var(--accent); }

    .post-excerpt {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .post-tag {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
    }

    @media (max-width: 640px) {
      .main { padding: 2rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>
  <div class="site">
    <main class="main">
      <header class="header">
        <div class="header-top">
          <a href="/" class="site-name">Kiko Tajada</a>
          <nav>
            <a href="/">Home</a>
            <a href="/blog/" class="active">Blog</a>
          </nav>
        </div>
      </header>

      <h1 class="page-title">Blog</h1>
      <p class="page-subtitle">Thoughts on supply chain, finance, and ideas worth sharing.</p>

      <div class="post-list">
        <article class="post">
          <div class="post-date">May 2, 2026</div>
          <a href="#" class="post-title">Welcome to My Blog</a>
          <p class="post-excerpt">This is a placeholder for my first post. More writing on supply chain, strategy, and finance coming soon.</p>
          <span class="post-tag">General</span>
        </article>
      </div>
    </main>
  </div>
</body>
</html>
